<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race 'N' Chase 80s</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="splash-screen" class="screen">
            <img src="gamepage.png" id="splash-img" alt="Logo">
            <button id="start-btn">START GAME</button>
        </div>

        <div id="options-menu" class="screen" style="display:none;">
            <h1 style="color: #0ff;">SELECT SKILL</h1>
            <button onclick="startGame('low')">LOW</button>
            <button onclick="startGame('medium')">MEDIUM</button>
            <button onclick="startGame('high')">HIGH</button>
        </div>

        <div id="game-over-screen" class="screen" style="display:none;">
            <h1 style="color: red;">CRASHED!</h1>
            <p id="final-score" style="font-size: 24px; color: #0ff;"></p>
            <p id="high-score" style="font-size: 20px; color: gold;"></p>
            <button onclick="location.reload()">REPLAY MISSION</button>
        </div>

        <canvas id="gameCanvas" style="display:none;"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
