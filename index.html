<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race 'N' Chase 80s</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="splash-screen" class="screen">
            <img src="gamepage.png" id="splash-img">
            <button onclick="showOptions()">START GAME</button>
        </div>

        <div id="options-menu" class="screen" style="display:none;">
            <h1>DIFFICULTY</h1>
            <button onclick="startGame('low')">LOW</button>
            <button onclick="startGame('medium')">MEDIUM</button>
            <button onclick="startGame('high')">HIGH</button>
        </div>

        <canvas id="gameCanvas" width="400" height="600" style="display:none;"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
